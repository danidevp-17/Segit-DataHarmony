services:
  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    environment:
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres@postgres:5432/dataharmony
      - REDIS_URL=redis://redis:6379/0
      - CORS_ORIGINS=http://localhost:3000
      - LOG_LEVEL=INFO
      - LOG_JSON=true
      # AUTH_SKIP_VALIDATION se lee desde .env (env_file arriba); no sobreescribir aquí.
    volumes:
      - ../../apps/data/uploads:/app/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dataharmony
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dataharmony"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  celery:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    command: celery -A core.celery_app worker --loglevel=info
    env_file:
      - ../../.env
    environment:
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres@postgres:5432/dataharmony
      - REDIS_URL=redis://redis:6379/0
      # AUTH_SKIP_VALIDATION se lee desde .env (env_file arriba); no sobreescribir aquí.
    volumes:
      - ../../apps/data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    env_file:
      - ../../apps/web/.env.local
    environment:
      - INTERNAL_API_URL=http://api:8000
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - AUTH_URL=http://localhost:3000
      - WATCHPACK_POLLING=true
    volumes:
      - ../../apps/web:/app
      - web_node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
  web_node_modules:
